name: Security · secret scan

# Fails the build if a secret is committed. Scans full git history with gitleaks, using the
# allowlist in .gitleaks.toml. Runs the binary directly (no marketplace action) so it does not
# require an organization license.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit
          persist-credentials: false

      - name: Install gitleaks
        run: |
          version=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks detect --redact --no-banner --config .gitleaks.toml
