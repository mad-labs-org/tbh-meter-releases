# gitleaks config for tbh-meter. CI runs it on every PR + push (.github/workflows/secret-scan.yml);
# run locally with `gitleaks detect --config .gitleaks.toml`.
title = "tbh-meter gitleaks config"

[extend]
# Inherit gitleaks' built-in rule set (AWS, GitHub, Stripe, JWTs, private keys, etc.).
useDefault = true

[allowlist]
description = "Project-specific false positives."

paths = [
  # .env.example files hold only placeholders.
  '''(^|/)\.env\.example$''',
  # The reader's bundled calibration seed is a large blob of IL2CPP memory offsets / type
  # indices (hex + base64-looking ids), not credentials — it is regenerated by
  # reader/scripts/seed_calib_capture.py and ships inside tbh-reader.exe.
  '''^reader/config/calib_seed\.json$''',
]
